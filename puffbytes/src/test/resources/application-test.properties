spring.application.name=puffbytes-test

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

jwt.secret=ThisIsMySuperSecretKeyForJWTAuthentication1234567890
jwt.expiration=900000
jwt.refresh.expiration=604800000

google.client.id=test-google-client-id
google.client.secret=test-google-secret
github.client.id=test-github-id
github.client.secret=test-github-secret

puffbytes.storage.upload-directory=${java.io.tmpdir}/puffbytes-test-uploads
puffbytes.storage.public-base-url=http://localhost:8080/uploads

# Integration test profile still boots Mongo auto-config; use a dedicated DB or start Mongo locally for mvn test.
spring.data.mongodb.uri=mongodb://127.0.0.1:27017/puffbytes_test

logging.level.org.springframework=WARN
