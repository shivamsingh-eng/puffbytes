# PostgreSQL (override via env: POSTGRES_*)
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/puffbytes_auth}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# MongoDB (Spring Boot auto-configuration; override via MONGODB_URI)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/puffbytes}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — set JWT_SECRET in production (min ~32 bytes for HS256)
jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForJWTAuthentication1234567890}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

#clientId and clientSecret for sign in with google and github
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}

#connection for mongodb
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

#configuration for file upload in upload service
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Local file storage (override with STORAGE_* env)
puffbytes.storage.upload-directory=${STORAGE_UPLOAD_DIR:uploads}
puffbytes.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/uploads}

#Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379