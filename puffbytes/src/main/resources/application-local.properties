# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/puffbytes_auth
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT expiration in 15 mins and refresh token will expire in 7 days
jwt.secret=ThisIsMySuperSecretKeyForJWTAuthentication1234567890
jwt.expiration=900000
jwt.refresh.expiration=604800000

#clientId and clientSecret for sign in with google and github
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}